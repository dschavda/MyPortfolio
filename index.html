<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watchlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --border: #1e2130;
      --muted: #3a3f52;
      --text: #e8eaf0;
      --sub: #6b7194;
      --up: #22d483;
      --down: #f45b5b;
      --accent: #5b8af4;
      --glow: rgba(91,138,244,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 24px;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(91,138,244,0.08) 0%, transparent 70%);
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand {
      display: flex;
      flex-direction: column;
    }

    .brand-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 4px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #last-updated {
      font-size: 12px;
      color: var(--sub);
      font-family: 'Space Mono', monospace;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      background: var(--glow);
    }

    .refresh-btn svg {
      transition: transform 0.5s;
    }

    .refresh-btn.spinning svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sub);
      font-weight: 700;
      padding: 14px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    thead th:last-child { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    td {
      padding: 18px 20px;
    }

    .symbol-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .symbol-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.03em;
      flex-shrink: 0;
    }

    .symbol-name {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.01em;
    }

    .symbol-exchange {
      font-size: 11px;
      color: var(--sub);
      margin-top: 2px;
    }

    .price-cell {
      text-align: right;
    }

    .price-value {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .price-currency {
      font-size: 11px;
      color: var(--sub);
      margin-top: 2px;
      font-family: 'Space Mono', monospace;
    }

    .change-cell {
      text-align: right;
    }

    .change-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .change-badge.up {
      color: var(--up);
      background: rgba(34,212,131,0.1);
    }

    .change-badge.down {
      color: var(--down);
      background: rgba(244,91,91,0.1);
    }

    .change-badge.neutral {
      color: var(--sub);
      background: rgba(107,113,148,0.1);
    }

    /* Skeleton loader */
    .skeleton-row td {
      padding: 18px 20px;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--muted) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-icon { width: 36px; height: 36px; border-radius: 8px; }
    .skeleton-text { width: 80px; }
    .skeleton-sub { width: 50px; height: 10px; margin-top: 5px; }
    .skeleton-price { width: 70px; margin-left: auto; }
    .skeleton-change { width: 60px; margin-left: auto; }

    .error-row td {
      text-align: center;
      padding: 40px 20px;
      color: var(--down);
      font-size: 14px;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 36px 0 14px;
    }

    .section-label-text {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
      white-space: nowrap;
    }

    .section-label-text.india { color: #f97316; }
    .section-label-text.usa   { color: #5b8af4; }

    .section-label-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    footer {
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    @keyframes fadeInRow {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .data-row {
      animation: fadeInRow 0.3s ease both;
    }

    .flash-up   { animation: flashUp 0.6s ease; }
    .flash-down { animation: flashDown 0.6s ease; }

    @keyframes flashUp {
      0%   { background: rgba(34,212,131,0.12); }
      100% { background: transparent; }
    }
    @keyframes flashDown {
      0%   { background: rgba(244,91,91,0.12); }
      100% { background: transparent; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">
      <span class="brand-label">Global Markets</span>
      <h1>Watchlist</h1>
    </div>
    <div class="header-right">
      <span id="last-updated">—</span>
      <button class="refresh-btn" onclick="loadStocks()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
        Refresh
      </button>
    </div>
  </header>

  <!-- India table -->
  <div class="section-label">
    <span class="section-label-text india">🇮🇳 NSE India</span>
    <div class="section-label-line"></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Stock</th>
          <th style="text-align:right">Price (₹)</th>
          <th style="text-align:right">Change</th>
        </tr>
      </thead>
      <tbody id="indiaTableBody">
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
      </tbody>
    </table>
  </div>

  <!-- USA table -->
  <div class="section-label">
    <span class="section-label-text usa">🇺🇸 NASDAQ / NYSE</span>
    <div class="section-label-line"></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Stock</th>
          <th style="text-align:right">Price ($)</th>
          <th style="text-align:right">Change</th>
        </tr>
      </thead>
      <tbody id="usaTableBody">
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
        <tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>
      </tbody>
    </table>
  </div>

  <footer>Data via Yahoo Finance · Prices delayed ~15 min</footer>
</div>

<script>
  const INDIA_NAMES = {
    RELIANCE:  'Reliance Industries',
    TCS:       'Tata Consultancy',
    INFY:      'Infosys',
    HDFCBANK:  'HDFC Bank',
    ICICIBANK: 'ICICI Bank',
  };

  const USA_NAMES = {
    MSFT:  'Microsoft',
    ORCL:  'Oracle',
    GOOGL: 'Alphabet (Google)',
    NVDA:  'NVIDIA',
    CSCO:  'Cisco',
    AVGO:  'Broadcom',
    LLY:   'Eli Lilly',
  };

  let prevPrices = {};

  function fmtINR(n) {
    return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtUSD(n) {
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function skeletonRows(n) {
    return Array(n).fill(`<tr class="skeleton-row"><td><div style="display:flex;gap:12px;align-items:center"><div class="skeleton skeleton-icon"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-sub"></div></div></div></td><td><div class="skeleton skeleton-price"></div></td><td><div class="skeleton skeleton-change"></div></td></tr>`).join('');
  }

  async function loadStocks() {
    const btn = document.querySelector('.refresh-btn');
    btn.classList.add('spinning');

    try {
      const res = await fetch('/api/prices');
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();

      const india = data.filter(s => s.symbol.endsWith('.NS'));
      const usa   = data.filter(s => !s.symbol.endsWith('.NS'));

      renderTable(india, 'indiaTableBody', fmtINR, INDIA_NAMES, '.NS');
      renderTable(usa,   'usaTableBody',   fmtUSD, USA_NAMES,   '');

      const now = new Date();
      document.getElementById('last-updated').textContent =
        'Updated ' + now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    } catch (err) {
      const errRow = `<tr class="error-row"><td colspan="3">⚠ Could not load prices. Try again.</td></tr>`;
      document.getElementById('indiaTableBody').innerHTML = errRow;
      document.getElementById('usaTableBody').innerHTML   = errRow;
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function renderTable(data, tbodyId, fmtPrice, names, stripSuffix) {
    const tbody = document.getElementById(tbodyId);
    tbody.innerHTML = '';

    data.forEach((stock, i) => {
      const sym       = stock.symbol.replace(stripSuffix, '');
      const price     = stock.price;
      const prevClose = stock.previousClose || price;
      const change    = price - prevClose;
      const changePct = prevClose ? (change / prevClose) * 100 : 0;
      const isUp      = change >= 0;
      const initials  = sym.slice(0, 3);

      let flashClass = '';
      if (prevPrices[sym] !== undefined) {
        flashClass = price > prevPrices[sym] ? 'flash-up' : price < prevPrices[sym] ? 'flash-down' : '';
      }
      prevPrices[sym] = price;

      const arrow     = isUp ? '▲' : '▼';
      const badgeClass = Math.abs(changePct) < 0.01 ? 'neutral' : (isUp ? 'up' : 'down');

      const tr = document.createElement('tr');
      tr.className = `data-row ${flashClass}`;
      tr.style.animationDelay = `${i * 60}ms`;
      tr.innerHTML = `
        <td>
          <div class="symbol-cell">
            <div class="symbol-icon">${initials}</div>
            <div>
              <div class="symbol-name">${sym}</div>
              <div class="symbol-exchange">${names[sym] || ''}</div>
            </div>
          </div>
        </td>
        <td class="price-cell">
          <div class="price-value">${fmtPrice(price)}</div>
        </td>
        <td class="change-cell">
          <span class="change-badge ${badgeClass}">
            ${arrow} ${Math.abs(changePct).toFixed(2)}%
          </span>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  loadStocks();
  setInterval(loadStocks, 60000);
</script>
</body>
</html>
