# netlify.toml
# Tells Netlify where your site and functions live,
# and maps /api/prices → the serverless function.

[build]
  publish   = "."           # index.html is at the repo root
  functions = "netlify/functions"

# Redirect /api/prices to the Netlify Function
[[redirects]]
  from   = "/api/prices"
  to     = "/.netlify/functions/prices"
  status = 200
